swagger: "2.0"
info:
  title: Swagger API
  version: 1.0.0
host: api.example.com
basePath: /v1
schemes:
  - https
consumes:
  - application/json
produces:
  - application/json
securityDefinitions:
  ApiKeyAuth:
    type: apiKey
    name: X-API-Key
    in: header
paths:
  /users:
    get:
      summary: List users
      parameters:
        - name: limit
          in: query
          type: integer
    post:
      summary: Create user
      parameters:
        - name: body
          in: body
          schema:
            $ref: '#/definitions/User'
definitions:
  User:
    type: object
    properties:
      name:
        type: string
      age:
        type: integer
